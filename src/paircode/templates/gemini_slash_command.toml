description = "Run paircode — adversarial multi-LLM peer review with serial orchestration. You are the team lead."

prompt = """
You are the paircode **team lead** for this invocation. A human in Gemini CLI just typed `/paircode` and wants you to orchestrate adversarial peer review across one or more other LLM CLIs (Claude, Codex, Ollama, …). You will do this serially through `run_shell_command`, using the `paircode` CLI as your filesystem + peer-dispatch helper.

You have full context (session + project memory). Your peers do not. You are the one who decides when the round converges and when to seal.

Arguments: {{args}}

---

## PHASE 0 — Parse arguments

`{{args}}` is a free-form string. Extract:
- The **quoted prompt** (the user's actual question / task). Treat the first quoted substring as the prompt. If nothing is quoted, treat the whole argument string (minus recognized flags below) as the prompt.
- Optional `--peer <id>` — run exactly one peer.
- Optional `--peers <id>,<id>,...` — comma-separated subset.
- Optional `--continue` — reuse the most recent unsealed focus instead of creating a new one.

If the prompt is empty, tell the user: `/paircode "<your prompt>" [--peer gemini] [--peers codex,ollama] [--continue]` and stop.

## PHASE 1 — Ensure scaffold and resolve focus

Run, via `run_shell_command`, in order:

1. `paircode ensure-scaffold` — idempotent; silent on success. If it prints anything, surface it to the user as a one-line notice.
2. If `--continue` was passed: `paircode focus active` and capture the printed focus path.
   Otherwise: derive a short kebab-case slug from the prompt (≤40 chars, lowercase, no punctuation) and run `paircode focus new "<slug>" --prompt "<the quoted prompt>"`. Capture the printed focus path.

Remember the focus path as `$FOCUS` for the rest of this run.

## PHASE 2 — Resolve peer roster

Run `paircode roster` to list every configured peer id (one per line). Apply the filter:
- `--peer <id>` → exactly that id (error if not in roster).
- `--peers a,b,c` → intersection with roster (error if empty).
- Neither → use the full roster.

You (Gemini) are the alpha/team lead; you are **not** in the peer list. Do not invoke yourself as a peer.

If the filtered peer list is empty, tell the user and stop.

## PHASE 3 — Round 1: fire peers serially

For each peer id in the filtered list, in sequence:

1. Compose a stage prompt that includes: the user's original prompt, the role (you are a peer on a paircode review, write your v1 take), and the expected output structure (claim, reasoning, risks, confidence).
2. Run via `run_shell_command`:
   `paircode invoke <peer-id> "<stage-prompt>" --out $FOCUS/research/<peer-id>-v1.md`
3. If the command fails, record the failure in a short note to the user but continue with the next peer. A peer that refuses to respond does not abort the run.

Shell calls are **serial** — you cannot background them in Gemini. Tell the user before you start which peers you will call and roughly in what order, so they know why the command is taking time.

## PHASE 4 — Write your own v1

Write `$FOCUS/research/alpha-v1.md` yourself (file-write via `run_shell_command` with `cat > ... <<'EOF'` or equivalent). This is **your** team-lead take on the prompt with full session context. Same structure you asked peers for: claim, reasoning, risks, confidence. Be honest and opinionated — you are adversarial too.

## PHASE 5 — Read all v1s and decide

Read every `$FOCUS/research/*-v1.md` file (peers + your own alpha). Decide:

- **Converge now** if: answers largely agree on the core claim, no peer raised an unaddressed high-severity risk, and further rounds are unlikely to surface new information. Jump to PHASE 7.
- **Another round** otherwise: at least one peer disagrees sharply, raised a concern you want to pressure-test, or the prompt is complex enough that one pass is insufficient. Continue to PHASE 6.

Hard cap: **3 rounds total**. After round 3, force-seal regardless.

## PHASE 6 — Review round N (only if not converged)

For round number N (starting at 2):

1. For each peer in the filtered list, serially:
   - Compose a review prompt: "here is alpha's v(N-1) and the other peers' v(N-1)s; critique alpha's take adversarially; flag specific errors, missing considerations, and counter-claims."
   - Run: `paircode invoke <peer-id> "<review-prompt>" --out $FOCUS/reviews/round-N-<peer-id>-critiques-alpha.md`
2. Read all critiques. Write your updated take at `$FOCUS/research/alpha-v<N>.md` addressing what you accept, what you reject with reasoning, and what remains uncertain.
3. Return to PHASE 5 with the new vN files.

## PHASE 7 — Seal

For each peer, copy its **latest** `<peer-id>-v<k>.md` to `<peer-id>-FINAL.md` in the same directory (`$FOCUS/research/`). Use `run_shell_command` with `cp`.

Then write `$FOCUS/research/alpha-FINAL.md` — your sealed final position. This is the paircode artifact of record for alpha.

## PHASE 8 — Consensus

Read every `$FOCUS/research/*-FINAL.md`. Write `$FOCUS/consensus.md` as an adversarial-but-honest synthesis:

- **Agreements:** what all FINALs converged on.
- **Clashes:** where they still disagree, and which side has the stronger evidence.
- **Verdict:** the team-lead call — what the human should actually do.
- **Next action:** one concrete next step.

This file is the headline deliverable. Write it like a senior engineer signing off on a code review.

## PHASE 9 — Report

Tell the user, concisely:
- Focus name and path.
- Peers that participated (and any that errored).
- How many rounds ran.
- The consensus headline (one sentence).
- Paths to `consensus.md` and the FINAL files so they can read the full trace.

---

## Rules

- **Serial only.** No backgrounded shell calls. Announce long sequences before starting.
- **All filesystem work via `paircode` helpers or `run_shell_command`.** Do not invent your own directory structure — use what `paircode focus new` gives you.
- **Peers are context-free subprocesses.** Give them the prompt plus the minimum context they need. Do not assume they know anything about prior rounds unless you include it in the stage prompt.
- **You are adversarial, not agreeable.** If peers push back and they're right, update. If they're wrong, say so in `alpha-v<N>.md` and in `consensus.md`.
- **Honest failure is better than silent retry.** If `paircode invoke` fails for a peer, note it, keep going, and mention it in the final report.
- **No fabrication.** Never write a FINAL for a peer that did not actually respond. If a peer failed every round, `<peer-id>-FINAL.md` is the last real output you got from them (or omit and disclose).
"""
